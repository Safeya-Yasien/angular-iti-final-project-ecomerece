<div class="edit-container">
  <div class="edit-card">
    <div class="edit-header">
      <h3>Edit Product Details</h3>
      <p>Modify the information below to update your product</p>
    </div>
    
    <form [formGroup]="editForm" (ngSubmit)="onUpdate()" class="edit-form">
      
      <!-- Product Title -->
      <div class="form-group">
        <label>Product Title</label>
        <input type="text" formControlName="title" placeholder="Enter product name">
      </div>
      
      <!-- Description -->
      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description" rows="3" placeholder="Update product description..."></textarea>
      </div>

      <!-- Price and Quantity Row -->
      <div class="form-row">
        <div class="form-group flex-1">
          <label>Price ($)</label>
          <input type="number" formControlName="price" placeholder="0.00">
        </div>
        <div class="form-group flex-1">
          <label>Quantity</label>
          <input type="number" formControlName="quantity" placeholder="E.g. 10">
        </div>
      </div>

      <!-- Image URL -->
      <div class="form-group">
        <label>Image Cover URL</label>
        <input type="text" formControlName="imageCover" placeholder="https://example.com/image.jpg">
      </div>

      <!-- Category ID -->
      <div class="form-group">
        <label>Category ID</label>
        <input type="text" formControlName="category" placeholder="Enter category ID">
      </div>

      <!-- Action Buttons -->
      <div class="button-group">
        <button type="submit" class="save-btn" [disabled]="editForm.invalid">
          Update Product
        </button>
        <button type="button" class="cancel-btn" (click)="goBack()">
          Cancel
        </button>
      </div>
      
    </form>
  </div>
</div>
