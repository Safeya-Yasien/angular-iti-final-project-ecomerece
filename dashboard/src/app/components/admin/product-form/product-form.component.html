<div class="form-container">
  <div class="form-card">
    <div class="form-header">
      <h3>Add New Product</h3>
    </div>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="product-form">

      <!-- Product Title -->
      <div class="form-group">
        <label>Product Title</label>
        <input type="text" formControlName="title" placeholder="Enter product name"
          [class.error-border]="productForm.get('title')?.invalid && productForm.get('title')?.touched">
        </div>

        <!-- Description -->
        <div class="form-group">
          <label>Description</label>
          <textarea formControlName="description" rows="3" placeholder="Write a detailed description..."></textarea>
          <span class="hint">Must be at least 20 characters long.</span>
        </div>

        <!-- Price and Quantity -->
        <div class="form-row">
          <div class="form-group flex-1">
            <label>Price</label>
            <input type="number" formControlName="price" placeholder="0.00">
          </div>
          <div class="form-group flex-1">
            <label>Quantity</label>
            <input type="number" formControlName="quantity" placeholder="E.g. 10">
          </div>
        </div>

        <!-- Product Image -->
        <div class="form-group">
          <label>Product Image</label>
          <input type="file" (change)="onFileSelect($event)" class="file-input">
        </div>

        <!-- Category ID -->
        <div class="input-group">
          <label>Choose Category</label>
          <select formControlName="category" class="form-control">
            <option value="" disabled selected>Select a Category</option>

            <!-- Loop على الأقسام التي جلبناها -->
            @for (cat of categories; track cat) {
              <option [value]="cat._id">
                {{ cat.title }} <!-- سيظهر للمستخدم: Electronics أو Phones -->
              </option>
            }

          </select>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" [disabled]="productForm.invalid">
          Save Product
        </button>

      </form>
    </div>
  </div>
