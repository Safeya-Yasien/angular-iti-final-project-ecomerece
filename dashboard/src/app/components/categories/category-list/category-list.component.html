<div class="page-header">
  <h2>Category Management</h2>
  <button mat-raised-button color="primary" (click)="openForm()">
    + Add Category
  </button>
</div>

<div *ngIf="isLoading" class="loading">
  <mat-spinner diameter="40"></mat-spinner>
</div>

<mat-card *ngIf="!isLoading">
  <table mat-table [dataSource]="categories" class="full-width">
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let cat">{{ cat.title }}</td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let cat">
        <button mat-icon-button color="primary" (click)="openForm(cat)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteCategory(cat._id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <p *ngIf="categories.length === 0" class="empty">No categories found.</p>
</mat-card>
