<div
  class="min-h-screen py-12 px-4 sm:px-6 lg:px-8 relative bg-linear-to-br from-slate-50 via-white to-amber-50/30 antialiased overflow-hidden"
>
  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-20 -left-32 w-80 h-80 bg-amber-200/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-10 right-0 w-96 h-96 bg-orange-100/30 rounded-full blur-3xl"></div>
  </div>

  <div class="max-w-7xl mx-auto relative z-10">
    <div class="mb-8">
      <a
        routerLink="/shop"
        class="inline-flex items-center gap-2 text-slate-500 hover:text-amber-600 transition-all duration-300 font-bold text-sm uppercase tracking-wider bg-white/50 backdrop-blur-sm px-5 py-2.5 rounded-full shadow-sm border border-white/50 group"
      >
        <i
          class="fa-solid fa-arrow-left-long text-xs group-hover:-translate-x-1 transition-transform"
        ></i>
        Back to Shop
      </a>
    </div>

    <div
      class="bg-white/70 backdrop-blur-lg rounded-[40px] shadow-2xl border border-white/40 overflow-hidden transition-all"
    >
      <div class="grid md:grid-cols-2 gap-0">
        <div
          class="p-10 lg:p-14 bg-slate-900/5 backdrop-blur-sm border-b md:border-b-0 md:border-r border-white/30"
        >
          <div class="space-y-8">
            <div
              class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-400 text-slate-900 shadow-lg shadow-amber-400/20"
            >
              <i class="fa-regular fa-message text-3xl animate-bounce-slow"></i>
            </div>

            <div class="space-y-4">
              <h1 class="text-4xl font-black tracking-tight text-slate-800">Let’s talk</h1>
              <p class="text-slate-500 leading-relaxed font-medium text-lg">
                Our team usually responds within 24 hours. We're here to help you find your style.
              </p>
            </div>

            <div class="space-y-6 pt-4">
              <div class="flex items-center gap-5 group">
                <div
                  class="w-11 h-11 rounded-xl bg-white shadow-sm flex items-center justify-center text-amber-600 group-hover:bg-amber-500 group-hover:text-white transition-all"
                >
                  <i class="fa-regular fa-envelope"></i>
                </div>
                <div>
                  <h4 class="font-bold text-slate-800 text-sm">Email us</h4>
                  <p class="text-slate-500 text-sm font-medium">hello@luxestyle.com</p>
                </div>
              </div>

              <div class="flex items-center gap-5 group">
                <div
                  class="w-11 h-11 rounded-xl bg-white shadow-sm flex items-center justify-center text-amber-600 group-hover:bg-amber-500 group-hover:text-white transition-all"
                >
                  <i class="fa-regular fa-location-dot"></i>
                </div>
                <div>
                  <h4 class="font-bold text-slate-800 text-sm">Showroom</h4>
                  <p class="text-slate-500 text-sm font-medium">123 Design Avenue, NYC</p>
                </div>
              </div>
            </div>

            <!-- Social Links -->
            <div class="pt-8 border-t border-slate-200/50 flex gap-4">
              <a
                href="#"
                class="w-10 h-10 rounded-full bg-white text-slate-400 flex items-center justify-center hover:bg-slate-900 hover:text-white transition-all shadow-sm"
                ><i class="fa-brands fa-instagram"></i
              ></a>
              <a
                href="#"
                class="w-10 h-10 rounded-full bg-white text-slate-400 flex items-center justify-center hover:bg-slate-900 hover:text-white transition-all shadow-sm"
                ><i class="fa-brands fa-linkedin-in"></i
              ></a>
            </div>
          </div>
        </div>

        <div class="p-10 lg:p-14 bg-white/40 border-2 border-white/30 backdrop-blur-sm">
          <form class="space-y-6">
            <div class="space-y-2">
              <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1"
                >Full Name</label
              >
              <input
                formControlName="name"
                type="text"
                class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-white focus:ring-4 focus:ring-amber-400/10 focus:border-amber-400 outline-none transition-all font-medium text-slate-700 shadow-sm"
                placeholder="John Carter"
              />
            </div>

            <div class="space-y-2">
              <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1"
                >Email Address</label
              >
              <input
                formControlName="email"
                type="email"
                class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-white focus:ring-4 focus:ring-amber-400/10 focus:border-amber-400 outline-none transition-all font-medium text-slate-700 shadow-sm"
                placeholder="hello@example.com"
              />
            </div>

            <div class="space-y-2">
              <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1"
                >Message</label
              >
              <textarea
                formControlName="message"
                rows="4"
                class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-white focus:ring-4 focus:ring-amber-400/10 focus:border-amber-400 outline-none transition-all font-medium text-slate-700 shadow-sm resize-none"
                placeholder="Tell us how we can help..."
              ></textarea>
            </div>

            <button
              type="submit"
              class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl shadow-slate-900/10 hover:bg-amber-500 hover:text-slate-900 transition-all duration-500 disabled:opacity-50 disabled:cursor-not-allowed group"
            >
              SEND MESSAGE
              <i
                class="fa-regular fa-paper-plane ml-2 group-hover:translate-x-1 transition-transform"
              ></i>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
