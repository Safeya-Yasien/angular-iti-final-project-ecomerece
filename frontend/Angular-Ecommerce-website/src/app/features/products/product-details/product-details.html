<div class="min-h-screen bg-slate-50 py-8 px-4">
  <div class="max-w-7xl mx-auto">
    <div class="mb-8">
      <a
        routerLink="/shop"
        class="inline-flex items-center gap-2 text-slate-500 hover:text-amber-600 transition-all duration-300 font-bold text-sm uppercase tracking-wider bg-white/50 backdrop-blur-sm px-5 py-2.5 rounded-full shadow-sm border border-white/50 group"
      >
        <i
          class="fa-solid fa-arrow-left-long text-xs group-hover:-translate-x-1 transition-transform"
        ></i>
        Back to Shop
      </a>
    </div>

    <div
      class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center bg-white/40 backdrop-blur-xl rounded-[40px] p-8 lg:p-12 shadow-xl border border-white/20"
    >
      <div class="relative group">
        <div
          class="absolute -inset-4 bg-amber-400/20 rounded-[40px] blur-2xl opacity-0 group-hover:opacity-100 transition duration-1000"
        ></div>
        <div
          class="relative bg-white rounded-4xl overflow-hidden shadow-inner border border-slate-100"
        >
          <img
            [src]="product.image"
            [alt]="product.name"
            class="w-full h-125 object-contain p-8 transition-transform duration-700 group-hover:scale-105"
          />
        </div>
      </div>

      <div class="space-y-8">
        <div>
          @if (product.badge) {
            <span
              class="inline-block bg-amber-400 text-slate-900 text-[10px] font-black uppercase tracking-[0.2em] px-4 py-1.5 rounded-full mb-4 shadow-lg shadow-amber-400/30"
            >
              {{ product.badge }}
            </span>
          }
          <h1 class="text-5xl font-black text-slate-900 tracking-tighter leading-none mb-4">
            {{ product.name }}
          </h1>

          <div class="flex items-center gap-4">
            <div
              class="flex items-center gap-1.5 bg-slate-900 text-white px-3 py-1 rounded-full text-xs font-bold"
            >
              <i class="fa-solid fa-star text-amber-400"></i> {{ product.rating }}
            </div>
            <span
              class="text-slate-400 text-sm font-medium underline underline-offset-4 decoration-slate-200"
            >
              {{ product.reviews }} Customer Reviews
            </span>
          </div>
        </div>

        <p class="text-slate-500 text-lg leading-relaxed font-medium">
          {{ product.description }}
        </p>

        <div class="flex items-baseline gap-2">
          <span class="text-5xl font-black text-slate-900 tracking-tighter"
            ><span class="text-xl font-medium">$</span>{{ product.price }}</span
          >
          <span class="text-slate-400 font-bold line-through text-lg"
            >${{ product.price + 100 }}</span
          >
        </div>

        <div class="flex flex-col sm:flex-row gap-4 pt-8">
          <button
            class="flex-1 bg-slate-900 text-white h-16 rounded-2xl font-black text-lg hover:bg-slate-800 hover:shadow-2xl hover:shadow-slate-900/30 active:scale-95 transition-all duration-300 flex items-center justify-center gap-3"
          >
            <i class="fa-solid fa-cart-plus"></i> Add to Cart
          </button>
          <button
            class="w-16 h-16 rounded-2xl border-2 border-slate-100 flex items-center justify-center text-xl text-slate-800 hover:bg-red-50 hover:border-red-100 hover:text-red-500 transition-all duration-300"
          >
            <i class="fa-solid fa-heart"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
