<div
  class="group bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden cursor-pointer border border-gray-100 hover:border-amber-200"
>
  <div class="relative overflow-hidden h-64">
    <img
      [src]="product.image"
      [alt]="product.name"
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
    />
    <div
      class="absolute top-3 left-3 bg-amber-400 text-slate-900 text-xs font-bold px-2 py-1 rounded-full"
      if="product.badge"
    >
      {{ product.badge }}
    </div>
    <button
      class="absolute bottom-3 right-3 bg-white/90 backdrop-blur-sm p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 hover:bg-amber-400"
    >
      <i class="fa-solid fa-heart text-slate-900"></i>
    </button>
  </div>
  <div class="p-5">
    <div class="flex justify-between items-start">
      <div>
        <h3 class="font-bold text-slate-800 text-lg line-clamp-1">{{ product.name }}</h3>
        <p class="text-gray-500 text-sm mt-1 line-clamp-2">{{ product.description }}</p>
      </div>
      <div class="text-amber-600 font-bold text-xl">\${{ product.price }}</div>
    </div>
    <div class="flex justify-between items-center mt-4">
      <div class="flex items-center gap-1 text-yellow-400">
        <span> <i class="fa-solid fa-star"></i></span>
        <span class="text-gray-600 font-medium text-sm">{{ product.rating }}</span>

        <span class="text-gray-400 text-xs ml-1">({{ product.reviews }})</span>
      </div>
      <button
        [routerLink]="['/product', product.id]"
        class="bg-slate-800 text-white px-4 py-2 rounded-full text-sm font-semibold hover:bg-amber-400 hover:text-slate-900 transition"
      >
        View →
      </button>
    </div>
  </div>
</div>
