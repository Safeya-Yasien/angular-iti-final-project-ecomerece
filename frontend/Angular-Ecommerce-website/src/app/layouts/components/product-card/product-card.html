<div
  class="group relative bg-white/70 backdrop-blur-md rounded-3xl shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 overflow-hidden cursor-pointer border border-slate-100 hover:border-amber-200/50"
>
  <!-- Image Container -->
  <div class="relative overflow-hidden h-72">
    <div
      class="absolute inset-0 bg-linear-to-t from-slate-900/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-10"
    ></div>

    <img
      [src]="product.image"
      [alt]="product.name"
      class="w-full h-full object-contain p-4 transition-transform duration-700 ease-out group-hover:scale-110"
    />

    @if (product.badge) {
      <div
        class="absolute top-4 left-4 z-20 bg-amber-400 text-slate-900 text-[10px] uppercase tracking-widest font-black px-3 py-1.5 rounded-lg shadow-lg shadow-amber-400/30"
      >
        {{ product.badge }}
      </div>
    }

    <button
      (click)="$event.stopPropagation()"
      class="absolute top-4 right-4 z-20 bg-white/80 backdrop-blur-md p-2.5 rounded-xl shadow-xl opacity-0 group-hover:opacity-100 -translate-y-2.5 group-hover:translate-y-0 transition-all duration-300 hover:bg-red-500 hover:text-white group/heart"
    >
      <i
        class="fa-solid fa-heart transition-transform duration-300 group-hover/heart:scale-125"
      ></i>
    </button>
  </div>

  <div class="p-6">
    <div class="flex justify-between items-start mb-3">
      <div class="flex-1">
        <h3
          class="font-black text-slate-800 text-lg leading-tight group-hover:text-amber-600 transition-colors duration-300"
        >
          {{ product.name }}
        </h3>
        <span class="text-[10px] text-amber-500 font-bold uppercase tracking-tighter italic"
          >Official Store</span
        >
      </div>
      <div class="flex flex-col items-end">
        <span class="text-2xl font-black text-slate-900 tracking-tighter">
          <span class="text-sm font-medium mr-0.5">$</span>{{ product.price }}
        </span>
      </div>
    </div>

    <div class="flex items-center justify-between mt-6 pt-4 border-t border-slate-50">
      <div class="flex items-center gap-1.5">
        <div class="flex text-amber-400 text-[10px]">
          <i class="fa-solid fa-star"></i>
        </div>
        <span class="text-slate-700 font-bold text-sm">{{ product.rating.rate }}</span>
        <span class="text-slate-400 text-xs font-medium">({{ product.reviews }} reviews)</span>
      </div>

      <button
        [routerLink]="['/shop/product', product.id]"
        class="relative overflow-hidden bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:shadow-xl hover:shadow-slate-900/20 active:scale-95 transition-all duration-300"
      >
        <span class="relative z-10 flex items-center gap-2">
          Details
          <i
            class="fa-solid fa-arrow-right-long transition-transform group-hover:translate-x-1"
          ></i>
        </span>
      </button>
    </div>
  </div>
</div>
