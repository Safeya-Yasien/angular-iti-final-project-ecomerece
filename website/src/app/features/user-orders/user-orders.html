<div class="container mt-5">
  <h2 class="mb-4 text-center">My Orders History</h2>
  
  <div *ngIf="orders.length === 0" class="text-center p-5 border rounded bg-light">
    <p class="text-muted">You haven't placed any orders yet!</p>
    <a routerLink="/products" class="btn btn-primary">Start Shopping</a>
  </div>

  <div class="row">
    <div class="col-md-8 mx-auto mb-3" *ngFor="let order of orders">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="fw-bold">Order ID: #{{ order._id.slice(-6) }}</span>
            <span class="badge" [ngClass]="{
              'bg-warning': order.status === 'pending',
              'bg-success': order.status === 'delivered',
              'bg-info': order.status === 'shipped',
              'bg-danger': order.status === 'cancelled'
            }">{{ order.status | uppercase }}</span>
          </div>
          <p class="small text-muted mb-1">Date: {{ order.createdAt | date:'medium' }}</p>
          <hr>
          <div class="d-flex justify-content-between">
            <span class="fw-bold">Total Amount:</span>
            <span class="text-primary fw-bold">{{ order.totalPrice | currency }}</span>
          </div>
          <div class="mt-3">
            <button class="btn btn-sm btn-outline-primary w-100">View Details & Tracking</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
