<div class="bg-linear-to-r from-slate-900 to-slate-800 sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-0">
    <div class="flex flex-wrap items-center justify-between py-3 md:py-4">
      <div class="shrink-0">
        <a routerLink="/" class="text-2xl font-bold text-amber-400 hover:text-amber-300 transition">
          <i class="fa-solid fa-shopping-bag mr-2"></i>
          <span class="text-white">E-</span>commerce
        </a>
      </div>

      <div class="hidden md:block flex-1 max-w-md mx-4">
        <input
          type="text"
          placeholder="Search products..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
          (keyup.enter)="search()"
          class="w-full px-4 py-2 rounded-full bg-white/10 text-white placeholder-gray-300 border border-white/20 focus:outline-none focus:ring-1 focus:ring-amber-400"
        />
      </div>

      <div class="flex flex-wrap items-center gap-2 md:gap-4">
        <a
          routerLink="/"
          routerLinkActive="!text-amber-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-1 text-gray-200 hover:text-amber-400 transition px-2 py-1 text-sm md:text-base cursor-pointer"
        >
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
          </svg>
          Home
        </a>

        <a
          routerLink="/about"
          routerLinkActive="!text-amber-400"
          class="flex items-center gap-1 text-gray-200 hover:text-amber-400 transition px-2 py-1 text-sm md:text-base cursor-pointer"
        >
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 15c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1s1 .45 1 1v4c0 .55-.45 1-1 1zm0-8c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"
            ></path>
          </svg>
          About
        </a>

        <a
          routerLink="/shop"
          routerLinkActive="!text-amber-400"
          class="flex items-center gap-1 text-gray-200 hover:text-amber-400 transition px-2 py-1 text-sm md:text-base cursor-pointer"
        >
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path
              d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1z"
            />
          </svg>
          Products
        </a>

        <a
          routerLink="/contact"
          routerLinkActive="!text-amber-400"
          class="flex items-center gap-1 text-gray-200 hover:text-amber-400 transition px-2 py-1 text-sm md:text-base cursor-pointer"
        >
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path
              d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
            />
          </svg>
          Contact
        </a>

        @if (isAdmin()) {
          <a
            routerLink="/admin"
            routerLinkActive="!text-amber-400"
            class="flex items-center gap-1 bg-orange-500/20 rounded-full px-3 py-1 text-gray-200 hover:text-amber-400 transition text-sm md:text-base cursor-pointer"
          >
            Dashboard
          </a>
        }

        <a
          routerLink="/cart"
          routerLinkActive="!text-amber-400"
          class="relative flex items-center gap-1 text-gray-200 hover:text-amber-400 transition px-2 py-1 text-sm md:text-base cursor-pointer"
        >
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path
              d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1z"
            />
          </svg>
          Cart
          <span
            class="absolute -top-1 -right-2 bg-orange-500 text-white text-xs rounded-full px-1.5 min-w-5 text-center"
            >{{ cartCount() }}</span
          >
        </a>

        @if (!isAuthenticated()) {
          <a
            routerLink="/login"
            routerLinkActive="!text-amber-400"
            class="flex items-center gap-1 bg-amber-400 rounded-full px-3 py-1 text-gray-600 transition text-sm md:text-black cursor-pointer hover:bg-amber-300"
          >
            Sign in
          </a>
        } @else {
          <div class="relative">
            <button
              type="button"
              (click)="toggleUserMenu()"
              class="flex items-center gap-2 text-gray-200 hover:text-amber-400 transition px-2 py-1 cursor-pointer"
            >
              <span
                class="w-8 h-8 rounded-full bg-amber-500 text-white flex items-center justify-center font-semibold text-sm"
              >
                {{ userInitial() }}
              </span>
              <span class="hidden md:inline text-sm">
                {{ currentUser()?.name || 'Account' }}
              </span>
            </button>
            @if (userMenuOpen()) {
              <div
                class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-slate-200 py-1 z-50"
              >
                <div class="px-4 py-2 border-b border-slate-100">
                  <p class="text-sm font-semibold text-slate-900 truncate">
                    {{ currentUser()?.name }}
                  </p>
                  <p class="text-xs text-slate-500 truncate">
                    {{ currentUser()?.email }}
                  </p>
                </div>
                <a
                  routerLink="/cart"
                  routerLinkActive="!text-amber-400"
                  (click)="closeUserMenu()"
                  class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50"
                  >My cart</a
                >
                <a
                  routerLink="/checkout"
                  routerLinkActive="!text-amber-400"
                  (click)="closeUserMenu()"
                  class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50"
                  >Checkout</a
                >
                <button
                  type="button"
                  (click)="logout()"
                  class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 cursor-pointer"
                >
                  Sign out
                </button>
              </div>
            }
          </div>
        }
      </div>

      <div class="w-full md:hidden mt-3">
        <input
          type="text"
          placeholder="Search products..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
          (keyup.enter)="search()"
          class="w-full px-4 py-2 rounded-full bg-white/10 text-white placeholder-gray-300 border border-white/20 focus:outline-none focus:ring-1 focus:ring-amber-400"
        />
      </div>
    </div>
  </div>
</div>
