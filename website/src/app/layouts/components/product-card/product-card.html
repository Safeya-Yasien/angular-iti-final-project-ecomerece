<div
  class="group relative bg-white/70 backdrop-blur-md rounded-3xl shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 overflow-hidden cursor-pointer border border-slate-100 hover:border-amber-200/50"
>
  <div class="relative overflow-hidden h-72">
    <div
      class="absolute inset-0 bg-linear-to-t from-slate-900/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-10"
    ></div>

    <img
      [src]="product.imageCover"
      (error)="handleImageError($event)"
      alt="{{ product.title }}"
      class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700"
    />

    <button
      (click)="onAddToWishlist(product._id)"
      [class.opacity-100]="isInWishlist"
      class="absolute top-4 right-4 z-20 bg-white/80 backdrop-blur-md p-2.5 rounded-xl shadow-xl opacity-0 group-hover:opacity-100 -translate-y-2.5 group-hover:translate-y-0 transition-all duration-300 hover:bg-slate-50 group/heart"
    >
      <i
        [class.text-red-500]="isInWishlist"
        [class.text-slate-400]="!isInWishlist"
        class="fa-solid fa-heart transition-transform duration-300 group-hover/heart:scale-125"
      ></i>
    </button>
  </div>

  <div class="p-6">
    <div class="flex justify-between items-start mb-3">
      <div class="flex-1">
        <h3
          class="font-bold text-gray-900 text-base leading-tight group-hover:text-amber-600 transition-colors duration-300 line-clamp-2 min-h-12"
        >
          {{ product.title }}
        </h3>
        <span class="text-[10px] text-amber-500 font-bold uppercase tracking-tighter italic">
          Official Store
        </span>
      </div>
      <div class="flex flex-col items-end">
        <span class="text-2xl font-black text-slate-900 tracking-tighter">
          <span class="text-sm font-medium mr-0.5">$</span>{{ product.price }}
        </span>
      </div>
    </div>

    <div class="flex items-center gap-1.5 mb-4">
      <div class="flex text-amber-400 text-[10px]">
        <i class="fa-solid fa-star"></i>
      </div>
      <span class="text-slate-700 font-bold text-sm">{{ product.ratingsAverage || 0 }}</span>
      <span class="text-slate-400 text-xs font-medium">
        ({{ product.ratingsQuantity || 0 }} reviews)
      </span>
    </div>

    <div class="flex items-center justify-between gap-2 mt-6 pt-4 border-t border-slate-50">
      <button
        [routerLink]="['/shop/product', product._id]"
        class="flex-1 relative overflow-hidden bg-slate-100 text-slate-900 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-slate-200 active:scale-95 transition-all duration-300"
      >
        <span class="flex items-center justify-center gap-2">
          Details
          <i class="fa-solid fa-arrow-right-long"></i>
        </span>
      </button>

      <button
        (click)="onAddToCart($event)"
        class="bg-slate-900 text-white px-6 py-2 rounded-full font-bold hover:bg-amber-400 hover:text-slate-900 transition shadow-lg transform"
      >
        <span class="relative z-10 flex items-center gap-2">
          <i class="fa-solid fa-cart-plus"></i>
          Add
        </span>
      </button>
    </div>
  </div>
</div>
